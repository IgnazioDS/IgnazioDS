<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Base gradient: ink to charcoal -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09090b"/>
      <stop offset="0.4" stop-color="#0d0d0f"/>
      <stop offset="1" stop-color="#111114"/>
    </linearGradient>

    <!-- Red-orange radial glow (primary accent) -->
    <radialGradient id="glow1" cx="0.75" cy="0.35" r="0.45">
      <stop stop-color="#E84637" stop-opacity="0.12"/>
      <stop offset="0.5" stop-color="#E84637" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#E84637" stop-opacity="0"/>
    </radialGradient>

    <!-- Ember secondary glow -->
    <radialGradient id="glow2" cx="0.2" cy="0.8" r="0.4">
      <stop stop-color="#C4783A" stop-opacity="0.08"/>
      <stop offset="0.6" stop-color="#C4783A" stop-opacity="0.02"/>
      <stop offset="1" stop-color="#C4783A" stop-opacity="0"/>
    </radialGradient>

    <!-- Small concentrated accent -->
    <radialGradient id="glow3" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#E84637" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#E84637" stop-opacity="0"/>
    </radialGradient>

    <!-- Ember node glow -->
    <radialGradient id="node-glow" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#C4783A" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#C4783A" stop-opacity="0"/>
    </radialGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M72 0V72M0 72H72" stroke="#E84637" stroke-opacity="0.025" stroke-width="0.5"/>
    </pattern>

    <!-- Fine dot grid -->
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.5" fill="#E84637" fill-opacity="0.06"/>
    </pattern>

    <filter id="blur-lg"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="blur-md"><feGaussianBlur stdDeviation="30"/></filter>
    <filter id="blur-sm"><feGaussianBlur stdDeviation="12"/></filter>

    <!-- Clipping for rounded corners -->
    <clipPath id="rounded"><rect width="1200" height="320" rx="16"/></clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <!-- Base fill -->
    <rect width="1200" height="320" fill="url(#bg)"/>

    <!-- Grid texture -->
    <rect width="1200" height="320" fill="url(#grid)"/>
    <rect width="1200" height="320" fill="url(#dots)" opacity="0.5"/>

    <!-- Atmospheric glows -->
    <rect width="1200" height="320" fill="url(#glow1)"/>
    <rect width="1200" height="320" fill="url(#glow2)"/>

    <!-- Concentrated light bloom, top right -->
    <ellipse cx="880" cy="100" rx="200" ry="140" fill="#E84637" fill-opacity="0.06" filter="url(#blur-lg)"/>

    <!-- Secondary bloom, bottom left -->
    <ellipse cx="250" cy="280" rx="180" ry="120" fill="#C4783A" fill-opacity="0.05" filter="url(#blur-lg)"/>

    <!-- Small hot spot -->
    <circle cx="740" cy="140" r="40" fill="#E84637" fill-opacity="0.08" filter="url(#blur-md)"/>

    <!-- ── Network / constellation lines (AI systems feel) ── -->
    <!-- Main connecting lines -->
    <line x1="180" y1="80" x2="420" y2="140" stroke="#E84637" stroke-opacity="0.06" stroke-width="0.5"/>
    <line x1="420" y1="140" x2="620" y2="90" stroke="#E84637" stroke-opacity="0.05" stroke-width="0.5"/>
    <line x1="620" y1="90" x2="740" y2="140" stroke="#E84637" stroke-opacity="0.07" stroke-width="0.5"/>
    <line x1="740" y1="140" x2="900" y2="100" stroke="#E84637" stroke-opacity="0.06" stroke-width="0.5"/>
    <line x1="900" y1="100" x2="1060" y2="160" stroke="#E84637" stroke-opacity="0.04" stroke-width="0.5"/>
    <line x1="420" y1="140" x2="480" y2="240" stroke="#C4783A" stroke-opacity="0.04" stroke-width="0.5"/>
    <line x1="740" y1="140" x2="680" y2="250" stroke="#E84637" stroke-opacity="0.04" stroke-width="0.5"/>
    <line x1="900" y1="100" x2="960" y2="220" stroke="#C4783A" stroke-opacity="0.05" stroke-width="0.5"/>
    <line x1="620" y1="90" x2="580" y2="200" stroke="#E84637" stroke-opacity="0.03" stroke-width="0.5"/>
    <line x1="480" y1="240" x2="680" y2="250" stroke="#E84637" stroke-opacity="0.035" stroke-width="0.5"/>
    <line x1="680" y1="250" x2="960" y2="220" stroke="#C4783A" stroke-opacity="0.03" stroke-width="0.5"/>

    <!-- Branch lines -->
    <line x1="180" y1="80" x2="120" y2="180" stroke="#E84637" stroke-opacity="0.03" stroke-width="0.5"/>
    <line x1="1060" y1="160" x2="1120" y2="260" stroke="#C4783A" stroke-opacity="0.03" stroke-width="0.5"/>
    <line x1="300" y1="260" x2="480" y2="240" stroke="#C4783A" stroke-opacity="0.03" stroke-width="0.5"/>

    <!-- ── Nodes ── -->
    <!-- Primary nodes (brighter) -->
    <circle cx="740" cy="140" r="16" fill="#E84637" fill-opacity="0.03" filter="url(#blur-sm)"/>
    <circle cx="740" cy="140" r="3" fill="#E84637" fill-opacity="0.35"/>
    <circle cx="740" cy="140" r="1.5" fill="#E84637" fill-opacity="0.6"/>

    <circle cx="900" cy="100" r="14" fill="#E84637" fill-opacity="0.03" filter="url(#blur-sm)"/>
    <circle cx="900" cy="100" r="2.5" fill="#E84637" fill-opacity="0.3"/>
    <circle cx="900" cy="100" r="1.2" fill="#E84637" fill-opacity="0.55"/>

    <circle cx="420" cy="140" r="12" fill="#C4783A" fill-opacity="0.03" filter="url(#blur-sm)"/>
    <circle cx="420" cy="140" r="2.5" fill="#C4783A" fill-opacity="0.3"/>
    <circle cx="420" cy="140" r="1.2" fill="#C4783A" fill-opacity="0.5"/>

    <!-- Secondary nodes -->
    <circle cx="620" cy="90" r="2" fill="#E84637" fill-opacity="0.22"/>
    <circle cx="180" cy="80" r="2" fill="#E84637" fill-opacity="0.15"/>
    <circle cx="1060" cy="160" r="2" fill="#C4783A" fill-opacity="0.18"/>
    <circle cx="480" cy="240" r="2" fill="#C4783A" fill-opacity="0.2"/>
    <circle cx="680" cy="250" r="2" fill="#E84637" fill-opacity="0.18"/>
    <circle cx="960" cy="220" r="1.5" fill="#C4783A" fill-opacity="0.16"/>
    <circle cx="580" cy="200" r="1.5" fill="#E84637" fill-opacity="0.12"/>
    <circle cx="120" cy="180" r="1.5" fill="#E84637" fill-opacity="0.1"/>
    <circle cx="1120" cy="260" r="1.5" fill="#C4783A" fill-opacity="0.1"/>
    <circle cx="300" cy="260" r="1.5" fill="#C4783A" fill-opacity="0.12"/>

    <!-- ── Floating geometric accents ── -->
    <!-- Thin diamond -->
    <polygon points="1040,40 1052,55 1040,70 1028,55" fill="none" stroke="#E84637" stroke-opacity="0.08" stroke-width="0.5"/>

    <!-- Small squares -->
    <rect x="80" y="40" width="8" height="8" fill="none" stroke="#E84637" stroke-opacity="0.06" stroke-width="0.5" transform="rotate(45 84 44)"/>
    <rect x="1140" y="140" width="6" height="6" fill="none" stroke="#C4783A" stroke-opacity="0.06" stroke-width="0.5" transform="rotate(30 1143 143)"/>

    <!-- Thin arcs -->
    <path d="M60 300 Q200 260 340 300" fill="none" stroke="#E84637" stroke-opacity="0.03" stroke-width="0.5"/>
    <path d="M800 20 Q920 60 1040 20" fill="none" stroke="#C4783A" stroke-opacity="0.03" stroke-width="0.5"/>

    <!-- ── Vignette: darken edges ── -->
    <rect width="1200" height="320" fill="#09090b" fill-opacity="0.3" mask="url(#vignette-mask)"/>

    <!-- Top edge fade -->
    <rect width="1200" height="40" fill="#09090b" fill-opacity="0.4"/>
    <rect width="1200" height="20" fill="#09090b" fill-opacity="0.2" y="40"/>

    <!-- Bottom edge fade -->
    <rect width="1200" height="40" y="280" fill="#09090b" fill-opacity="0.4"/>
    <rect width="1200" height="20" y="260" fill="#09090b" fill-opacity="0.2"/>

    <!-- Left edge fade -->
    <rect width="40" height="320" fill="#09090b" fill-opacity="0.3"/>

    <!-- Right edge fade -->
    <rect x="1160" width="40" height="320" fill="#09090b" fill-opacity="0.3"/>

    <!-- Outer border -->
    <rect x="0.5" y="0.5" width="1199" height="319" rx="16" fill="none" stroke="#E84637" stroke-opacity="0.06" stroke-width="1"/>
  </g>
</svg>
